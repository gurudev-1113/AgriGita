services:
  # Backend Service
  - type: web
    name: agrigita-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrigita-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

  # Frontend Service (Static Site)
  - type: web
    name: agrigita-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: agrigita-backend
          property: host

databases:
  - name: agrigita-db
    databaseName: agrigita
    user: agri
