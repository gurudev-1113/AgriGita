services:
  # Backend Service
  - type: web
    name: agrigita-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrigita-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

  # Frontend Service (Official Static Site type)
  - type: static_site
    name: agrigita-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://agrigita-backend.onrender.com

databases:
  - name: agrigita-db
    databaseName: agrigita
    user: agri
